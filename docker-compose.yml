# docker-compose.yml
# Spins up the local-dev backing services so the app runs without any cloud account.
#   - postgres : the relational database (table created by the migration SQL)
#   - minio    : S3-compatible object storage; stands in for Cloudflare R2 locally
#
# Usage:  docker compose up -d
#         docker compose down       (add -v to also wipe the data volumes)

services:
  postgres:
    image: postgres:16
    container_name: imagehosting-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: imagehosting
    ports:
      # Host 5433 -> container 5432. Uses 5433 because a local/native Postgres may
      # already occupy 5432 on the host; this avoids the clash. Update DATABASE_URL to match.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: imagehosting-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console (http://localhost:9001)
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
